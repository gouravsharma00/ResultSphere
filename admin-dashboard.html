<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard | ResultSphere</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .navbar {
            background: #1e293b; /* Deep Navy Blue */
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar h1 { margin: 0; font-size: 1.5rem; }
        .logout-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .logout-btn:hover { background-color: #dc2626; }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .data-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #64748b; /* Slate gray accent */
        }
        .data-card h2 { 
            margin-top: 0; 
            color: #1e293b; 
            border-bottom: 2px solid #f1f5f9; 
            padding-bottom: 10px; 
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group.full-width { grid-column: 1 / -1; }
        .input-group label { margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px; }
        .input-group input, .input-group select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus, .input-group select:focus { border-color: #1e293b; background: white; }
        .submit-btn {
            background-color: #1e293b; /* Deep Navy */
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #0f172a; }
        .success-msg {
            background-color: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
            border: 1px solid #bbf7d0;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>ResultSphere | Faculty Portal</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>

    <div class="container">
        <div class="data-card">
            <h2>Enter Student Result</h2>
            <div id="successMsg" class="success-msg">Success: Data Added to Database!</div>
            
            <form id="dataEntryForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Student Name</label>
                        <input type="text" id="studentName" placeholder="e.g. Rahul Verma" required>
                    </div>
                    <div class="input-group">
                        <label>Roll Number</label>
                        <input type="text" id="rollNumber" placeholder="e.g. 2024CS01" required>
                    </div>
                    <div class="input-group">
                        <label>Semester</label>
                        <input type="number" id="semester" placeholder="e.g. 6" min="1" max="8" required>
                    </div>
                    <div class="input-group">
                        <label>Subject Name</label>
                        <input type="text" id="subjectName" placeholder="e.g. Web Technology" required>
                    </div>
                    <div class="input-group full-width">
                        <label>Marks Obtained (out of 100)</label>
                        <input type="number" id="marksObtained" placeholder="e.g. 85" min="0" max="100" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Submit Result</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('dataEntryForm');
            const successMsg = document.getElementById('successMsg');
            const logoutBtn = document.getElementById('logoutBtn');

            logoutBtn.addEventListener('click', () => {
                sessionStorage.clear();
                window.location.href = 'index.html';
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // 1. Gather form inputs into a new object
                const newResult = {
                    name: document.getElementById('studentName').value.trim(),
                    rollNumber: document.getElementById('rollNumber').value.trim(),
                    semester: document.getElementById('semester').value.trim(),
                    subject: document.getElementById('subjectName').value.trim(),
                    marks: document.getElementById('marksObtained').value
                };

                // 2. Fetch the existing array from localStorage, or start a blank array if empty
                let resultsDatabase = JSON.parse(localStorage.getItem('studentResults')) || [];

                // 3. Add the new record to our array
                resultsDatabase.push(newResult);

                // 4. Save the array back to localStorage as a string
                localStorage.setItem('studentResults', JSON.stringify(resultsDatabase));

                // 5. Show success message and clear the form for the next student
                successMsg.style.display = 'block';
                form.reset();

                // Hide success message automatically after 3 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            });
        });
    </script>
</body>
</html>
