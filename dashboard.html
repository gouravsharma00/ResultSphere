<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Academic Portal</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            font-family: sans-serif;
        }
        .dashboard-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
        }
        .logout-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .logout-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h2 style="color: #2a9d8f;">Success!</h2>
        <p style="color: #475569; margin-bottom: 25px;">Welcome to your ResultSphere Dashboard.</p>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </div>
</body>
</html>
